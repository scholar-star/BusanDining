<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /* 전체 폼 스타일 */
        body {
            font-family: 'Arial', sans-serif;
            background-image: url('/images/gamcheon.jpg');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 93%;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        /* 포커스 시 입력 필드 스타일 */
        input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
            outline: none;
        }

        /* 오류 발생 시 입력 필드 스타일 */
        .error-field {
            border: 2px solid #ff4d4d !important;
            background-color: #ffe6e6;
        }

        /* 에러 메시지 스타일 */
        .error-message {
            color: #ff4d4d;
            font-size: 13px;
            font-weight: bold;
            margin-top: 5px;
            padding: 5px 10px;
            background-color: #ffe6e6;
            border-radius: 5px;
            display: inline-block;
            animation: slideDown 0.3s ease-in-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 버튼 스타일 */
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>회원가입</h2>
    <form role="form" name="signup" action="/signupPost" th:object="${signupDTO}" method="post">
        <div class="form-group">
            <label for="userID">아이디</label>
            <input type="text" id="userID" th:field="*{userID}" placeholder="ID"
                   th:classappend="${#fields.hasErrors('userID')} ? 'error-field' : ''">
            <div th:if="${#fields.hasErrors('userID')}" th:errors="*{userID}" class="error-message">❌ 오류</div>
        </div>

        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" th:field="*{password}" placeholder="password"
                   th:classappend="${#fields.hasErrors('password')} ? 'error-field' : ''">
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-message">❌ 오류</div>
        </div>

        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'error-field' : ''">
            <div th:if="${#fields.hasErrors('name')}" th:errors="*{userID}" class="error-message">❌ 오류</div>
        </div>

        <div class="form-group">
            <label for="email">이메일</label>
            <input type="password" id="email" th:field="*{email}" placeholder="alpha@dot.com"
                   th:classappend="${#fields.hasErrors('email')} ? 'error-field' : ''">
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message">❌ 오류</div>
        </div>

        <div class="form-group">
            <label for="location">사는 도시</label>
            <input type="text" id="location" th:field="*{location}"
                   th:classappend="${#fields.hasErrors('location')} ? 'error-field' : ''">
            <div th:if="${#fields.hasErrors('location')}" th:errors="*{location}" class="error-message">❌ 오류</div>
        </div>

        <button type="submit">회원가입</button>
    </form>
</div>
</body>
</html>
