spring.application.name=dining

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.datasource.url=jdbc:mariadb://localhost:3306/infos
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=dining
spring.datasource.password=dining&user
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=580000
spring.datasource.hikari.auto-commit=true